# Alarm Configuration
alarms:
  enabled: true
  debounce_time: 60
  unreachable_threshold: 3
  trigger_on:
    - port_down
    - device_unreachable
    - snmp_error
    - mac_moved
    - vlan_changed
    - description_changed
  vlan_exclude:
    - 120
    - 130
    - 140
    - 50
  severity_routing:
    CRITICAL:
      telegram: true
      email: true
      events:
        - device_unreachable
        - multiple_ports_down
        - core_link_down
    HIGH:
      telegram: true
      email: true
      events:
        - mac_moved
        - port_down
        - snmp_error
    MEDIUM:
      telegram: false
      email: true
      events:
        - vlan_changed
        - port_up
        - mac_added
    LOW:
      telegram: false
      email: false
      events:
        - description_changed

# Telegram Notifications
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  notify_on:
    - port_down
    - port_up
    - device_unreachable

# Email Notifications
email:
  enabled: true
  smtp_host: "smtp.yandex.com"
  smtp_port: 465
  smtp_user: "destek@chamadaprestige.com"
  smtp_password: "yjaixkhyxewtuguq"
  from_address: "destek@chamadaprestige.com"
  to_addresses:
