# SNMP Worker Configuration
# Active configuration file for SNMP monitoring

# Database Configuration (PostgreSQL/MySQL)
database:
  host: 127.0.0.1
  port: 3306
  name: switchdb
  user: root
  password: ""
  pool_size: 10
  max_overflow: 20

# Global SNMP Configuration
snmp:
  version: "3"
  username: "snmpuser"
  auth_protocol: "SHA"
  auth_password: "AuthPass123!"
  priv_protocol: "AES"
  priv_password: "PrivPass123!"
  timeout: 2
  retries: 1
  max_bulk_size: 100

# Polling Configuration
polling:
  interval: 60
  parallel_devices: 15
  max_workers: 10
  # Faz 1 – her cihaz thread'i arasındaki bekleme süresi (milisaniye).
  # 38 cihaz × 100 ms = ~3.8 s yayılma; SNMP timeout (2 s) içinde tüm
  # cihazlar hâlâ paralel sorgulanır, ancak anlık CPU/ağ tepe değeri düşer.
  snmp_stagger_ms: 300
  # Faz 2 – eş zamanlı DB yazma işçisi sayısı.
  # 4 işçi, 10 işçiye (eski otomatik değer) kıyasla Phase 2 CPU kullanımını
  # %96-100'den ~%40-50'ye düşürür; toplam yazma süresi ~2-3 s artar.
  db_max_workers: 2
  # device_polling_data satır azaltma.
  # Her cihaz için art arda INSERT'ler arasındaki minimum süre (saniye).
  # Cihaz ONLINE↔UNREACHABLE geçişlerinde bu süre gözetilmez — her geçişte
  # hemen yazılır (alarm geçmişi korunur).  Normal çalışmada ise her 60 s'de
  # bir satır yazılır; 15 s interval ile bu ~4× azalma demektir.
  # 0 yaparsanız eski davranışa döner (her poll'da INSERT).
  polling_data_interval: 60
  # device_polling_data tablosunda kaç günlük veri tutulacak.
  # 7 gün, sağlık grafikleri için yeterli (grafik max 168 s = 7 gün gösterir).
  polling_data_retention_days: 7
  # Switch SNMP yükünü azaltma — MAC tablosu tarama aralığı.
  # Her cihaz için MAC FDB (Forwarding Database) SNMP sorguları arasındaki
  # minimum süre (saniye).  Aradaki döngülerde önbellek kullanılır.
  # C9200/C9300: per-VLAN context walk'ları azalır.
  # CBS350: FDB walk azalır.
  # 60 s → 15 s interval ile 4 döngüde 1 kez MAC sorgusu.
  # port_poll_interval ile eşitlenerek alarm sıralaması tutarlı hale getirildi.
  # 0 yaparsanız eski davranışa döner (her poll'da MAC sorgusu).
  mac_poll_interval: 60
  # Switch SNMP yükünü azaltma — cihaz bilgisi tarama aralığı.
  # sysDescr, sıcaklık, fan, PoE, CPU gibi "çevre birimi" bilgilerinin
  # kaç saniyede bir sorgulanacağını belirler.  Aradaki döngülerde önbellekteki
  # değer kullanılır; switch'e ek yük binmez.
  # 120 s → 15 s interval ile 8 döngüde 1 kez cihaz bilgisi sorgusu.
  # OID hataları olsa bile switch yükü minimumda tutar.
  # 0 yaparsanız her döngüde tam sorgu yapılır.
  device_info_poll_interval: 120
  # Switch SNMP yükünü azaltma — port durumu tarama aralığı.
  # ifTable, ifOperStatus, ifAdminStatus, dot1qPvid SNMP walk'ları arasındaki
  # minimum süre (saniye).  Aradaki döngülerde önbellek kullanılır;
  # DB port_status_data yazımı ve alarm kontrolü atlanır.
  # Alarm gecikme süresi en fazla port_poll_interval saniyedir.
  # 60 s → 15 s interval ile 4 döngüde 1 kez port SNMP walk.
  # 0 yaparsanız eski davranışa döner (her döngüde port walk).
  port_poll_interval: 60

